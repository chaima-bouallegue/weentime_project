<nav class="fixed top-0 w-full z-50 transition-all duration-300"
    [ngClass]="scrolled ? 'h-16 bg-white/95 dark:bg-slate-950/90 backdrop-blur-xl border-b border-slate-200/80 dark:border-white/10 shadow-sm py-0' : 'h-[80px] bg-transparent py-2'">
    <div class="max-w-7xl mx-auto px-6 lg:px-12 relative flex items-center justify-between h-full">

        <!-- ==================== LOGO (LEFT) ==================== -->
        <div class="flex-shrink-0 flex items-center z-10">
            <a routerLink="/" class="flex items-center gap-1.5 no-underline group">
                <!-- Image Logo -->
                <div class="flex items-center translate-y-0 group-hover:scale-105 transition-transform duration-300">
                    <app-logo [variant]="themeService.isDark() ? 'white' : 'full'" [size]="10" />
                </div>

                <!-- Text Logo Block -->
                <div class="flex flex-col justify-center translate-y-px">
                    <span class="text-base font-bold text-indigo-700 dark:text-indigo-400">WeenTime</span>
                    <!-- Baseline -->
                    <span
                        class="text-[9px] font-bold text-slate-500 dark:text-slate-400 tracking-[0.16em] uppercase whitespace-nowrap group-hover:text-indigo-500 transition-colors">
                        Gérez · Simplifiez · Évoluez
                    </span>
                </div>
            </a>
        </div>

        <!-- ==================== NAVIGATION (CENTER) ==================== -->
        <div class="hidden lg:flex flex-1 justify-center items-center gap-8 z-0">
            <a *ngFor="let link of navLinks" [routerLink]="link.path" [fragment]="link.fragment"
                [class.nav-link-active]="isActive(link.path, link.fragment)"
                class="relative px-2 py-2 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors group">
                {{ link.label }}
                <!-- Hover underline effect -->
                <span
                    class="absolute inset-x-2 bottom-1 h-0.5 bg-indigo-500 scale-x-0 group-hover:scale-x-100 transition-transform origin-left rounded-full"></span>
            </a>
        </div>

        <!-- ==================== CONTROLS (RIGHT) ==================== -->
        <div class="flex-shrink-0 flex items-center justify-end gap-5 z-10">
            <!-- Tools Group (Lang & Theme) -->
            <div class="hidden sm:flex items-center gap-2">
                <!-- Language Switcher -->
                <div
                    class="flex items-center p-1 rounded-full bg-slate-100/80 dark:bg-white/5 border border-slate-200/50 dark:border-white/10 backdrop-blur-sm">
                    <button *ngFor="let flag of langFlags" (click)="setLang(flag.code)"
                        class="px-3 py-1 text-xs font-bold rounded-full transition-all duration-200"
                        [ngClass]="langService.lang() === flag.code ? 'bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white'">
                        {{ flag.label }}
                    </button>
                </div>

                <!-- Theme Toggle -->
                <button (click)="toggleTheme()"
                    class="p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/10 hover:text-indigo-600 dark:hover:text-white transition-all shadow-sm">
                    <lucide-icon [name]="themeService.isDark() ? 'sun' : 'moon'" size="18"></lucide-icon>
                </button>
            </div>

            <!-- Vertical Divider -->
            <div class="w-px h-8 bg-slate-200 dark:bg-white/10 hidden lg:block"></div>

            <!-- Auth Group -->
            <div class="flex items-center gap-3">
                <a routerLink="/login"
                    class="hidden sm:flex px-4 py-2 text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-lg transition-all no-underline">
                    Connexion
                </a>

                <a routerLink="/register"
                    class="group relative inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-bold text-white transition-all bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 rounded-xl overflow-hidden no-underline active:scale-95 border border-indigo-500/50 whitespace-nowrap">
                    <span class="relative z-10 block">Essai gratuit</span>
                    <lucide-icon name="arrow-right" size="16"
                        class="relative z-10 transition-transform group-hover:translate-x-1"></lucide-icon>
                    <!-- Shimmer effect -->
                    <div
                        class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent z-0">
                    </div>
                </a>
            </div>
        </div>
    </div>
</nav>
