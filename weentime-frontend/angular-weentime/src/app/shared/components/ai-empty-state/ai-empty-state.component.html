<div class="empty" role="status">
  <div class="empty__icon" aria-hidden="true">
    <svg viewBox="0 0 64 64" width="44" height="44" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M32 4 8 12v18c0 14 10 26 24 30 14-4 24-16 24-30V12L32 4Z"></path>
      <path d="m22 32 7 7 13-14"></path>
    </svg>
  </div>
  <h4 class="empty__title">{{ title }}</h4>
  <p class="empty__subtitle">{{ subtitle }}</p>
  <span class="empty__status">
    <span class="empty__pulse" aria-hidden="true"></span>
    {{ statusLabel }}
  </span>
</div>
