<footer
    class="py-20 bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-white/10 relative z-10 transition-colors">
    <div class="max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 mb-20">
            <div class="col-span-1 lg:col-span-1">
                <app-logo [variant]="themeService.isDark() ? 'white' : 'full'" [size]="14"></app-logo>
                <p class="mt-8 text-slate-500 dark:text-slate-400 font-medium leading-relaxed">
                    La plateforme RH tout-en-un pour les entreprises d'Afrique du Nord. Modernisez, gérez, grandissez.
                </p>
                <div class="flex gap-4 mt-8">
                    <div *ngFor="let s of socialIcons"
                        class="w-10 h-10 rounded-xl bg-slate-200 dark:bg-white/5 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:text-indigo-600 transition-colors cursor-pointer">
                        <lucide-icon [name]="s" size="18"></lucide-icon>
                    </div>
                </div>
            </div>

            <div *ngFor="let group of footerLinks">
                <h4 class="text-slate-900 dark:text-white font-black uppercase tracking-widest text-xs mb-8">{{
                    group.title }}</h4>
                <ul class="space-y-4">
                    <li *ngFor="let link of group.links">
                        <a [routerLink]="link.path"
                            class="text-slate-500 dark:text-slate-400 font-bold hover:text-indigo-600 cursor-pointer transition-colors no-underline">
                            {{ link.label }}
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div
            class="pt-8 border-t border-slate-200 dark:border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-slate-500 dark:text-slate-400 font-bold text-sm">
                © 2026 WeenTime · Conçu avec ❤️ en Tunisie 🇹🇳
            </p>
            <div class="flex gap-8">
                <a routerLink="/privacy"
                    class="text-slate-500 dark:text-slate-400 font-bold text-sm hover:text-indigo-600 cursor-pointer transition-colors no-underline">Confidentialité</a>
                <a routerLink="/terms"
                    class="text-slate-500 dark:text-slate-400 font-bold text-sm hover:text-indigo-600 cursor-pointer transition-colors no-underline">CGU</a>
            </div>
        </div>
    </div>
</footer>
