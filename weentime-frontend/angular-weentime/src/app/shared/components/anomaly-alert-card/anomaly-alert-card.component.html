<article class="anomaly-card" [ngClass]="cardModifier" [class.anomaly-card--compact]="compact" *ngIf="anomaly">
  <header class="anomaly-card__header">
    <div class="anomaly-card__avatar" aria-hidden="true">{{ getInitials(employeeName) }}</div>
    <div class="anomaly-card__employee">
      <span class="anomaly-card__name">{{ employeeName }}</span>
      <span class="anomaly-card__date">{{ formattedDate }}</span>
    </div>
    <app-ai-risk-badge [risk]="anomaly.risk"></app-ai-risk-badge>
  </header>

  <div class="anomaly-card__score-section">
    <div class="anomaly-card__score-row">
      <span class="anomaly-card__score-label">Score de risque</span>
      <app-ai-confidence-chip [confidence]="getConfidence(anomaly.score)"></app-ai-confidence-chip>
    </div>
    <app-ai-score-bar [score]="anomaly.score"></app-ai-score-bar>
  </div>

  <h3 class="anomaly-card__title">{{ title }}</h3>

  <div class="anomaly-card__reason">
    <span class="anomaly-card__reason-icon" aria-hidden="true">!</span>
    <span class="anomaly-card__reason-copy">
      <small>Raison détectée</small>
      <strong>{{ primaryReason }}</strong>
      <em *ngIf="extraReasonCount > 0">+{{ extraReasonCount }} autre(s) signal(aux)</em>
    </span>
  </div>

  <p class="anomaly-card__explanation" *ngIf="!compact">
    {{ summary }}
  </p>

  <footer class="anomaly-card__actions">
    <button type="button" class="anomaly-btn anomaly-btn--ghost" (click)="emit('dismiss')">Ignorer</button>
    <button type="button" class="anomaly-btn anomaly-btn--outline" (click)="emit('contact')">Contacter</button>
    <button type="button" class="anomaly-btn anomaly-btn--primary" (click)="emit('open')">Voir détails</button>
  </footer>
</article>
