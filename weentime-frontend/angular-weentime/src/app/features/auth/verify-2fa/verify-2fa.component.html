<div class="h-screen w-full flex bg-white dark:bg-[#020817] font-['Plus_Jakarta_Sans',sans-serif] overflow-hidden">
  <div class="hidden lg:flex w-[40%] bg-gradient-to-br from-indigo-600 via-indigo-700 to-indigo-900 relative overflow-hidden shrink-0 z-20 flex-col justify-center p-12">
    <div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-white/10 rounded-full blur-3xl"></div>
    <app-logo [variant]="'white'" [size]="14" class="absolute top-12 left-12" />

    <div class="relative z-10">
      <h2 class="text-4xl font-black text-white leading-tight">Sécurité renforcée</h2>
      <p class="text-indigo-100 mt-4 text-lg">Saisissez le code de votre application d'authentification pour accéder à WeenTime.</p>
    </div>
  </div>

  <div class="flex-1 flex flex-col justify-center items-center px-6 relative"
       style="background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px); background-size: 24px 24px;">
    <div class="max-w-md w-full">
      <div class="mb-10 text-center">
        <h1 class="text-3xl font-black text-slate-900 dark:text-white">Vérification MFA</h1>
        <p class="text-slate-500 mt-2 font-medium">
          Entrez le code à 6 chiffres de Google Authenticator ou Microsoft Authenticator.
        </p>
      </div>

      <div class="flex justify-between gap-2 mb-8" [class.shake]="error()">
        @for (digit of digits(); track $index) {
          <input #digitInput
                 inputmode="numeric"
                 autocomplete="one-time-code"
                 type="text"
                 maxlength="6"
                 [value]="digits()[$index]"
                 (input)="onInput($event, $index)"
                 (keydown)="onKeyDown($event, $index)"
                 class="otp-input"
                 [class.otp-input-error]="error()"
                 placeholder="0">
        }
      </div>

      @if (error()) {
        <div class="flex items-center gap-2 p-4 mb-6 rounded-xl bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-sm font-bold">
          <lucide-icon name="alert-circle" size="18"></lucide-icon>
          {{ error() }}
        </div>
      }

      <button (click)="verify()"
              [disabled]="isLoading() || digits().join('').length < 6"
              class="w-full py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg shadow-xl shadow-indigo-500/20 transition-all flex items-center justify-center gap-2">
        @if (!isLoading()) {
          Confirmer
          <lucide-icon name="shield-check" size="20"></lucide-icon>
        } @else {
          <lucide-icon name="loader-2" size="20" class="animate-spin"></lucide-icon>
          Vérification...
        }
      </button>
    </div>

    <a routerLink="/login" class="absolute top-8 left-8 flex items-center gap-2 text-sm font-bold text-slate-400 hover:text-indigo-600 transition-colors">
      <lucide-icon name="arrow-left" size="16"></lucide-icon>
      Retour à la connexion
    </a>
  </div>
</div>
