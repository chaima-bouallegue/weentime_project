<div class="calendar-card">

  <!-- Nav header with month + today button -->
  <div class="calendar-header">
    <button class="nav-extra-btn" (click)="prevMonth()" title="Mois précédent">
      <lucide-angular [img]="iconChevronLeft" size="16"></lucide-angular>
    </button>
    <h3 class="month-label">{{ viewDate() | date:'MMMM yyyy':'':'fr' }}</h3>
    <button class="nav-extra-btn" (click)="nextMonth()" title="Mois suivant">
      <lucide-angular [img]="iconChevronRight" size="16"></lucide-angular>
    </button>
    <button class="today-btn" (click)="goToToday()">Aujourd'hui</button>
  </div>

  <!-- Grid -->
  <div class="calendar-grid">
    @for (day of ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim']; track day) {
      <div class="weekday-label">{{ day }}</div>
    }

    @for (day of days(); track day.date.getTime()) {
      <div
        class="calendar-day"
        [class.outside]="!day.isCurrentMonth"
        [class.today]="day.isToday"
        [class.weekend]="day.isWeekend"
        [class.is-holiday]="day.isHoliday"
        [class.is-remote]="day.isRemote"
      >
        <span class="day-number">{{ day.date | date:'d' }}</span>

        <div class="indicators">
          @if (day.isHoliday) {
            <span class="holiday-dot" title="Jour férié"></span>
          }
          @if (day.isRemote) {
            <span class="remote-dot" [class.half-day]="day.isHalfDay" title="Télétravail"></span>
          }
        </div>
      </div>
    }
  </div>

  <!-- Legend -->
  <div class="calendar-legend">
    <div class="legend-item">
      <span class="dot" style="background:#f59e0b"></span>
      <span>Férié</span>
    </div>
    <div class="legend-item">
      <span class="dot" style="background:#6366f1"></span>
      <span>Télétravail</span>
    </div>
  </div>

</div>
