<div class="calendar-wrapper select-none">
  <!-- Calendar Header -->
  <div class="flex items-center justify-between mb-6 px-1">
    <button (click)="prevMonth()" class="nav-btn">
      <lucide-angular [img]="iconChevronLeft" size="18"></lucide-angular>
    </button>
    
    <div class="text-center">
      <h4 class="text-sm font-black text-slate-900 dark:text-white uppercase tracking-widest">
        {{ getMonthLabel() }}
      </h4>
    </div>

    <button (click)="nextMonth()" class="nav-btn">
      <lucide-angular [img]="iconChevronRight" size="18"></lucide-angular>
    </button>
  </div>

  <!-- Weekdays -->
  <div class="grid grid-cols-7 gap-1 mb-2">
    @for (day of ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim']; track day) {
      <div class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase text-center py-2">
        {{ day }}
      </div>
    }
  </div>

  <!-- Days Grid -->
  <div class="grid grid-cols-7 gap-1">
    @for (day of days(); track day.date) {
      <div 
        class="calendar-day-cell relative"
        [class.other-month]="!day.isCurrentMonth"
        [class.is-today]="day.isToday"
        [class.weekend]="day.isWeekend"
        [class.is-holiday]="day.isHoliday"
        [class.is-remote]="day.isRemote"
      >
        <span class="day-number">{{ day.date.getDate() }}</span>
        
        @if (day.isRemote) {
          <div class="remote-indicator" [class.half-day]="day.isHalfDay">
            <lucide-angular [img]="iconMonitor" size="10"></lucide-angular>
          </div>
        }

        @if (day.isHoliday) {
          <div class="holiday-dot"></div>
        }
      </div>
    }
  </div>

  <!-- Legend -->
  <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800/50 flex flex-wrap gap-4">
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-indigo-500 shadow-sm shadow-indigo-200 dark:shadow-none"></div>
      <span class="text-[10px] font-black text-slate-500 uppercase tracking-tight">Télétravail</span>
    </div>
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-rose-400/20 border border-rose-400"></div>
      <span class="text-[10px] font-black text-slate-500 uppercase tracking-tight">Férié</span>
    </div>
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 rounded-md bg-slate-100 dark:bg-slate-800"></div>
      <span class="text-[10px] font-black text-slate-500 uppercase tracking-tight">Weekend</span>
    </div>
  </div>
</div>
