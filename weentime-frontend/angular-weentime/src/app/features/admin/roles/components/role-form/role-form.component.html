<div class="fixed inset-0 z-[2000] flex justify-end">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" (click)="close.emit()"></div>

  <!-- Drawer -->
  <div
    class="relative w-full max-w-md h-full bg-white dark:bg-slate-900 shadow-2xl flex flex-col animate-slide-in border-l border-white/20 dark:border-slate-800">

    <!-- Header -->
    <header
      class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-500/10 text-blue-500 flex items-center justify-center">
          <lucide-angular [img]="role ? iconEdit : iconPlus" size="20"></lucide-angular>
        </div>
        <div>
          <h2 class="text-lg font-black text-slate-800 dark:text-white leading-tight">
            {{ role ? 'Modifier le Rôle' : 'Nouveau Rôle' }}
          </h2>
          <p class="text-xs font-bold text-slate-400">Configuration système</p>
        </div>
      </div>
      <button
        class="w-8 h-8 flex items-center justify-center rounded-full text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
        (click)="close.emit()">
        <lucide-angular [img]="iconX" size="20"></lucide-angular>
      </button>
    </header>

    <!-- Form Content -->
    <div class="flex-1 overflow-y-auto p-6 space-y-6">

      <!-- Role Type Input -->
      <div class="space-y-2">
        <label class="block text-xs font-black uppercase tracking-widest text-slate-500 ml-1">
          Type de rôle
        </label>

        <!-- Préfixe ROLE_ fixe + champ texte libre -->
        <div class="flex items-center bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700
                 rounded-2xl overflow-hidden shadow-sm focus-within:ring-2 focus-within:ring-blue-500
                 focus-within:border-blue-500 transition-all" [class.opacity-60]="!!role">
          <div class="pl-3 pr-1 flex items-center text-slate-400 shrink-0">
            <lucide-angular [img]="iconShield" size="18"></lucide-angular>
          </div>
          <span class="pl-1 pr-2 py-3 text-sm font-black text-blue-500 select-none shrink-0">
            ROLE_
          </span>
          <input type="text" [value]="nomInput" (input)="onNomInputChange($any($event.target).value)"
            [disabled]="!!role" placeholder="PHARMACIE" class="flex-1 pr-4 py-3 bg-transparent text-sm font-bold text-slate-900 dark:text-white
                   placeholder-slate-400 focus:outline-none uppercase" />
        </div>

        <!-- Suggestions rapides (mode création uniquement) -->
        @if (!role) {
        <div class="flex flex-wrap gap-2 mt-2">
          @for (s of suggestions; track s) {
          <button type="button" (click)="selectSuggestion(s)" [class.bg-blue-100]="nomInput === s"
            [class.text-blue-700]="nomInput === s" [class.border-blue-300]="nomInput === s" class="px-3 py-1 text-xs font-bold rounded-full border border-slate-200 dark:border-slate-700
                       text-slate-500 dark:text-slate-400 hover:border-blue-300 hover:text-blue-600
                       hover:bg-blue-50 dark:hover:bg-blue-500/10 transition-all">
            {{ s }}
          </button>
          }
        </div>
        }

        <p class="text-xs text-amber-500 font-medium ml-1 flex items-center gap-1">
          <lucide-angular [img]="iconInfo" size="12"></lucide-angular>
          Le nom du rôle ne peut pas être modifié une fois créé.
        </p>
      </div>

      <!-- Description Input -->
      <div class="space-y-2">
        <label class="block text-xs font-black uppercase tracking-widest text-slate-500 ml-1">
          Description (Optionnelle)
        </label>
        <textarea [(ngModel)]="description" name="description" rows="4"
          placeholder="Résumé des privilèges de ce rôle..." class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border focus:bg-white dark:focus:bg-slate-900
                 border-slate-200 dark:border-slate-700 rounded-2xl text-sm font-medium text-slate-900
                 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500
                 focus:border-blue-500 transition-all shadow-sm resize-none">
        </textarea>
      </div>
    </div>

    <!-- Footer -->
    <footer class="p-6 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 shrink-0">
      <div class="flex gap-3">
        <button (click)="close.emit()" [disabled]="saving()" class="flex-1 px-4 py-3 rounded-2xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200
                 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors disabled:opacity-50">
          Annuler
        </button>
        <button (click)="onSubmit()" [disabled]="saving() || !nom" class="flex-1 px-4 py-3 rounded-2xl font-black text-white bg-blue-600 hover:bg-blue-700
                 dark:bg-blue-500 dark:hover:bg-blue-600 shadow-lg shadow-blue-500/30 dark:shadow-none
                 transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:hover:translate-y-0
                 disabled:shadow-none flex items-center justify-center gap-2">
          @if (saving()) {
          <lucide-angular [img]="iconSave" size="18" class="animate-pulse"></lucide-angular>
          <span>Enregistrement...</span>
          } @else {
          <lucide-angular [img]="iconSave" size="18"></lucide-angular>
          <span>{{ role ? 'Sauvegarder' : 'Créer le rôle' }}</span>
          }
        </button>
      </div>
    </footer>
  </div>
</div>
