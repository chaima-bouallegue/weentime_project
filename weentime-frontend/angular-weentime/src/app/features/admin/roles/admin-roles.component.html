<div class="rh-bento-container fade-in">
  <!-- Bento Hero Header -->
  <header class="dashboard-hero mb-8">
    <div class="hero-card overflow-hidden">
      <div class="card-mesh" [style.--mesh-color]="'#8b5cf6'"></div>
      
      <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8 p-10">
        <div class="flex-1 text-center md:text-left">
          <div class="flex items-center justify-center md:justify-start gap-3 mb-3">
            <span class="px-4 py-1.5 bg-purple-500 text-white rounded-full text-[11px] font-black uppercase tracking-wider shadow-lg shadow-purple-200 dark:shadow-none">
              Sécurité Globale
            </span>
          </div>
          
          <h1 class="text-4xl lg:text-5xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter">
            Gestion des Rôles
          </h1>
          <p class="text-lg font-medium text-slate-500 dark:text-slate-400 max-w-2xl leading-relaxed">
            Consultez et configurez les descriptions des rôles d'habilitation du système. {{ roles().length }} niveaux d'accès identifiés.
          </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-4">
           <button class="hero-btn secondary" (click)="loadRoles()" [disabled]="isLoading()">
              <lucide-angular [img]="iconRefresh" size="20" [class.animate-spin]="isLoading()"></lucide-angular>
              <span>Actualiser</span>
           </button>
           <button class="hero-btn primary-indigo" (click)="openCreateForm()">
              <lucide-angular [img]="iconPlus" size="20"></lucide-angular>
              <span>Nouveau Rôle</span>
           </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content Grid -->
  <main class="w-full">
    <section class="bento-card p-6 min-h-[500px]">
      <app-role-list
        [roles]="roles()"
        [loading]="isLoading()"
        (edit)="openEditForm($event)"
        (delete)="onDelete($event)"
      ></app-role-list>
    </section>
  </main>

  <!-- Drawer -->
  @if (isFormOpen()) {
    <app-role-form
      [role]="roleToEdit()"
      (close)="isFormOpen.set(false)"
      (saved)="onFormSaved()"
    ></app-role-form>
  }
</div>
