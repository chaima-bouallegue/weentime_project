<div class="flex-1 flex flex-col min-w-0 p-6 gap-6 overflow-auto">

  <header
    class="relative bg-gradient-to-r from-indigo-50/80 via-purple-50/30 to-transparent border border-slate-200 rounded-2xl p-6 shadow-sm select-none shrink-0 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
    <div class="space-y-2">
      <span
        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-indigo-100/80 text-indigo-700">
        Sécurité globale
      </span>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Gestion des Rôles</h1>
      <p class="text-sm font-medium text-slate-500 dark:text-slate-400 max-w-xl leading-relaxed">
        Consultez et configurez les descriptions des rôles d'habilitation du système.
        <span class="text-indigo-600 dark:text-indigo-400 font-semibold">{{ roles().length }} niveaux d'accès
          identifiés.</span>
      </p>
    </div>

    <div class="flex items-center gap-2.5 shrink-0 w-full sm:w-auto justify-end">
      <button type="button" (click)="loadRoles()" [disabled]="isLoading()"
        class="inline-flex items-center gap-2 px-4 py-2 border border-slate-200 text-slate-600 hover:text-slate-900 rounded-xl hover:bg-slate-50 transition-colors text-sm font-semibold shadow-sm disabled:opacity-50"
        title="Actualiser les données">
        <lucide-angular [img]="iconRefresh" size="14" [class.animate-spin]="isLoading()"></lucide-angular>
        <span>Actualiser</span>
      </button>

      <button type="button" (click)="openCreateForm()"
        class="inline-flex items-center gap-2 px-4 py-2 bg-[#4F46E5] hover:bg-[#4338CA] text-white rounded-xl transition-colors text-sm font-semibold shadow-sm">
        <lucide-angular [img]="iconPlus" size="14"></lucide-angular>
        <span>Nouveau Rôle</span>
      </button>
    </div>
  </header>

  <main class="min-h-0 flex-1">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 rounded-2xl p-6 shadow-sm min-h-[500px]">
      <app-role-list [roles]="roles()" [loading]="isLoading()" (edit)="openEditForm($event)"
        (delete)="onDelete($event)"></app-role-list>
    </div>
  </main>

  @if (isFormOpen()) {
  <app-role-form [role]="roleToEdit()" (close)="isFormOpen.set(false)" (saved)="onFormSaved()"></app-role-form>
  }

</div>
