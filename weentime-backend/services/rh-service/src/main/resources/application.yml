server:
  port: 8192

spring:
  application:
    name: rh-service
  datasource:
    url: jdbc:postgresql://localhost:5433/rh_db
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cloud:
    config:
      enabled: true
    discovery:
      enabled: true
  config:
    import: optional:configserver:http://localhost:8988
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 18
    validate-on-migrate: true
    connect-retries: 2

minio:
  endpoint: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:weentime-justificatifs}

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

application:
  config:
    organisation-service: http://localhost:8190

# ── AI Document Engine Configuration ──
gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyCYo7HsyVtiYh5M2uYYC0rGoeV4KIdqIeg}

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

# ── Email Configuration (MailDev en dev, Resend en prod) ──
spring.mail:
  host: ${MAIL_HOST:localhost}
  port: ${MAIL_PORT:1025}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail.smtp.auth: false
    mail.smtp.starttls.enable: false

weentime:
