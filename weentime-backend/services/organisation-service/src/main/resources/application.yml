server:
  port: 8190

spring:
  application:
    name: organisation-service

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

  config:
    import: optional:configserver:http://localhost:8988

  datasource:
    url: jdbc:postgresql://localhost:5433/organisation_db
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: 1
      maximum-pool-size: 10
      idle-timeout: 10000
      max-lifetime: 30000

  cloud:
    config:
      enabled: true
  flyway:
    # Run all migrations from V1; do not baseline an empty schema, otherwise V1__init.sql is skipped
    baseline-on-migrate: false
    validate-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

management:
  endpoint:
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "gateway,health,info,metrics,prometheus"
    health:
      show-details: always

application:
  config:
    rh-service: ${RH_SERVICE_URL:http://localhost:8192}

integration:
  internal-api-key: communication-service-local

spring.cloud.openfeign.client.config:
  default:
    connect-timeout: 5000
    read-timeout: 5000
    logger-level: full

logging:
  level:
    root: INFO
    com.weentime.weentimeproject: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN

resilience4j:
  circuitbreaker:
    instances:
      rhService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: TIME_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      organisationService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  timelimiter:
    instances:
      rhService:
        timeoutDuration: 2s
      organisationService:
        timeoutDuration: 2s

