
server:
  port: 8081

spring:
  application:
    name: auth-service

  cloud:
    config:
      enabled: false

  main:
    lazy-initialization: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false

