spring:
  cloud:
    config:
      enabled: false
    inetutils:
      ignored-interfaces:
        - docker0
        - vEthernet
  profiles:
    active: local
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
logging:
  level:
    com.netflix: WARN
    org.springframework.cloud: WARN

