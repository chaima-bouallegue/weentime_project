server:
  port: 8194

spring:
  application:
    name: communication-service
  datasource:
    url: jdbc:postgresql://localhost:5433/communication_db?currentSchema=communication
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver
    hikari:
      # Fix connexions mortes (Docker NAT Windows coupe les connexions TCP inactives ~18-20 min).
      # keepalive-time pingue la connexion avant la coupure. max-lifetime en filet de sécurité.
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1500000
      idle-timeout: 600000
      keepalive-time: 240000
      connection-timeout: 5000
      validation-timeout: 3000
      leak-detection-threshold: 30000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        default_schema: communication
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: communication
    schemas:
      - communication
  cloud:
    config:
      enabled: true
  config:
    import: optional:configserver:http://localhost:8988
  data:
    redis:
      host: localhost
      port: 6380
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

integration:
  organisation-service:
    url: http://localhost:8190
    internal-api-key: ${INTERNAL_API_KEY}

cors:
  allowed-origins: http://localhost:4200,http://127.0.0.1:4200

communication:
  internal-api-key: ${INTERNAL_API_KEY}
  websocket:
    broker: simple
    typing-throttle-ms: 1000
    relay:
      host: localhost
      port: 61613
      client-login: guest
      client-passcode: guest
      system-login: guest
      system-passcode: guest
  redis:
    enabled: false
    topic: communication.realtime
  outbox:
    dispatch-delay-ms: 5000
    batch-size: 50
    max-attempts: 5
    retry-backoff-ms: 10000
  replay:
    max-events: 200
    retention-days: 7
  storage:
    base-path: ./communication-uploads
    max-file-size-mb: 10

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.weentime.communication: DEBUG
    org.springframework.web.socket: INFO
    org.hibernate.SQL: INFO
