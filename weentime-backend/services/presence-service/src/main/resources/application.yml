server:
  port: 8093

spring:
  application:
    name: presence-service
  datasource:
    url: jdbc:postgresql://localhost:5433/presence_db
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1 # Prevent startup crash
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  sql:
    init:
      mode: always # Failsafe mode

  cloud:
    config:
      enabled: false
  config:
    import:
      optional:configserver: configserver:http://localhost:8888


eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000

presence:
  default:
    start-time: "09:00"
    end-time: "18:00"
    tolerance-minutes: 10
    working-days:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
  half-day-threshold-hours: 4.0
  absence-detection:
    cron: "0 55 23 * * *"

integration:
  user-service:
    url: http://localhost:8090
  leave-service:
    url: http://localhost:8092
  telework-service:
    url: http://localhost:8092

spring.cloud.openfeign.client.config:
  default:
    connect-timeout: 5000
    read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.weentime.weentimeapp: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN
