server:
  port: 8193

spring:
  application:
    name: presence-service
  datasource:
    url: jdbc:postgresql://localhost:5433/presence_db
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver

    hikari:
      # Fix connexions mortes (Docker NAT Windows coupe les connexions TCP inactives ~18-20 min).
      # keepalive-time pingue la connexion avant la coupure. max-lifetime en filet de sécurité.
      maximum-pool-size: 10
      minimum-idle: 2
      max-lifetime: 1500000
      idle-timeout: 600000
      keepalive-time: 240000
      connection-timeout: 5000
      validation-timeout: 3000
      leak-detection-threshold: 30000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  sql:
    init:
      mode: always # Failsafe mode

  cloud:
    config:
      enabled: true
  config:
    import: optional:configserver:http://localhost:8988


eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

presence:
  default:
    start-time: "09:00"
    end-time: "18:00"
    tolerance-minutes: 10
    working-days:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
  half-day-threshold-hours: 4.0
  timezone: "Africa/Tunis"
  auto-close-grace-minutes: 60
  overtime:
    threshold-minutes: 30
  gps-required: false
  public-holiday-exceptional-work-allowed: false
  location:
    resolver-enabled: true
    nominatim-url: "https://nominatim.openstreetmap.org/reverse"
    timeout-millis: 3000
    cache-coordinate-scale: 5
    accept-language: "fr"
    user-agent: "WeenTime/1.0"
  absence-detection:
    cron: "0 55 23 * * *"

integration:
  user-service:
    url: http://localhost:8190
  leave-service:
    url: http://localhost:8192
  holiday-service:
    url: http://localhost:8192
  telework-service:
    url: http://localhost:8192

weentime:
  internal:
    secret: ${INTERNAL_SECRET}

spring.cloud.openfeign.client.config:
  default:
    connect-timeout: 5000
    read-timeout: 5000

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 6
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        automatic-transition-from-open-to-half-open-enabled: true
        permitted-number-of-calls-in-half-open-state: 2
    instances:
      rhServiceClient:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.weentime.weentimeapp: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN
