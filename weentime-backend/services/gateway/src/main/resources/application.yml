server:
  port: 8322

spring:
  application:
    name: gateway

  config:
    import: optional:configserver:http://localhost:8988

  cloud:
    config:
      enabled: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST


      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "Accept"
              - "X-Requested-With"
              - "Origin"
              - "X-Skip-Error-Toast"
              - "X-Request-ID"
            allowCredentials: true

      discovery:
        locator:
          enabled: false

      # 🔗 ROUTES (LOCALHOST MODE)
      routes:

        - id: auth-service
          uri: http://localhost:8181
          predicates:
            - Path=/api/v1/auth/**

        - id: organisation-service
          uri: http://localhost:8190
          predicates:
            - Path=/api/v1/admin/**, /api/v1/organisations/**, /api/v1/users/**, /api/v1/notifications/**, /api/v1/structure/**

        - id: rh-service
          uri: http://localhost:8192
          predicates:
            - Path=/api/v1/rh/**, /api/v1/demandes/**, /api/v1/conges/**, /api/v1/solde-conges/**, /api/v1/documents/**, /api/v1/absences/**, /api/v1/autorisations/**, /api/v1/manager/**, /api/v1/leave-balances, /api/v1/leave-balances/**, /api/v1/teletravail, /api/v1/teletravail/**, /api/v1/recrutement/**, /api/v1/public/recrutement/**

        - id: presence-service
          uri: http://localhost:8193
          predicates:
            - Path=/api/v1/presence/**, /api/v1/presences/**, /api/presence/**, /api/v1/horaires/**

        - id: communication-service
          uri: http://localhost:8194
          predicates:
            - Path=/api/v1/communication/**

        - id: ai-service-api
          uri: http://localhost:8000
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=3

        - id: ai-service-audio-stream
          uri: http://localhost:8000
          predicates:
            - Path=/audio-stream, /audio-stream/**

        - id: organisation-ws
          uri: http://localhost:8190
          predicates:
            - Path=/ws/**, /ws-org/**

        - id: rh-ws
          uri: http://localhost:8192
          predicates:
            - Path=/ws-rh/**

        - id: presence-ws
          uri: http://localhost:8193
          predicates:
            - Path=/ws-presence/**

        - id: communication-ws
          uri: http://localhost:8194
          predicates:
            - Path=/ws-communication, /ws-communication/**

# 🌐 Eureka (optionnel mais OK en local)
eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# 📊 Monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

# 📘 Swagger aggregation (optionnel)
springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: http://localhost:8181/v3/api-docs
      - name: Organisation Service
        url: http://localhost:8190/v3/api-docs
      - name: RH Service
        url: http://localhost:8192/v3/api-docs
      - name: Presence Service
        url: http://localhost:8193/v3/api-docs
      - name: Communication Service
        url: http://localhost:8194/v3/api-docs

# 🧠 Logs (debug utile)
logging:
  level:
    org.springframework.cloud.gateway: INFO
