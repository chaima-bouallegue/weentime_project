server:
  port: 8193

spring:
  application:
    name: presence-service
  datasource:
    url: jdbc:postgresql://localhost:5435/presence_db
    username: weentime
    password: 170502
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    config:
      enabled: false
  config:
    import:
      optional:configserver: http://localhost:8988

eureka:
  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    server:
      enable-self-preservation: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000

presence:
  default:
    start-time: "09:00"
    end-time: "18:00"
    tolerance-minutes: 10
    working-days:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
  half-day-threshold-hours: 4.0
  absence-detection:
    cron: "0 55 23 * * *"

integration:
  user-service:
    url: http://localhost:8190
  leave-service:
    url: http://localhost:8192
  telework-service:
    url: http://localhost:8192
