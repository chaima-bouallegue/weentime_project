

server:
  port: 8181

spring:
  application:
    name: auth-service

  cloud:
    config:
      enabled: false

  main:
    lazy-initialization: true

  data:
    redis:
      host: localhost
      port: 6380

  mail:
    host: localhost
    port: 1027

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8861/eureka/
  server:
    enable-self-preservation: false

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    com.weentime: DEBUG

integration:
  internal-api-key: ${INTERNAL_API_KEY:communication-service-local}
