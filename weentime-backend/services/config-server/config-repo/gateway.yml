server:
  port: ${SERVER_PORT:8222}

spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_ORIGIN:http://localhost:4200}
              - ${FRONTEND_ORIGIN_ALT:http://127.0.0.1:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "Accept"
              - "Origin"
              - "X-Requested-With"
              - "X-Skip-Error-Toast"
              - "X-Request-ID"
              - "X-User-Id"
              - "X-User-Role"
              - "X-Role"
              - "X-Tenant-Id"
              - "X-Entreprise-Id"
              - "X-Company-Id"
              - "X-Dashboard-Scope"
              - "X-Current-Page"
              - "X-Agent-Role"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8181}
          predicates:
            - Path=/api/v1/auth/**
        - id: organisation-service
          uri: ${ORGANISATION_SERVICE_URI:http://localhost:8190}
          predicates:
            - Path=/api/v1/admin/**, /api/v1/organisations/**, /api/v1/users/**, /api/v1/notifications/**, /api/v1/structure/**
        - id: rh-service
          uri: ${RH_SERVICE_URI:http://localhost:8192}
          predicates:
            - Path=/api/v1/rh/**, /api/v1/demandes/**, /api/v1/conges/**, /api/v1/solde-conges/**, /api/v1/documents/**, /api/v1/absences/**, /api/v1/autorisations/**, /api/v1/manager/**, /api/v1/leave-balances, /api/v1/leave-balances/**, /api/v1/teletravail, /api/v1/teletravail/**, /api/v1/recrutement/**, /api/v1/public/recrutement/**, /api/v1/internal/recruitment/**
        - id: presence-service
          uri: ${PRESENCE_SERVICE_URI:http://localhost:8193}
          predicates:
            - Path=/api/v1/presence/**, /api/v1/presences/**, /api/presence/**, /api/v1/horaires/**, /api/v1/overtime/**
        - id: communication-service
          uri: ${COMMUNICATION_SERVICE_URI:http://localhost:8194}
          predicates:
            - Path=/api/v1/communication/**
        - id: ai-service-api
          uri: ${AI_SERVICE_URI:http://localhost:8000}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=3
        - id: ai-service-audio-stream
          uri: ${AI_SERVICE_URI:http://localhost:8000}
          predicates:
            - Path=/audio-stream, /audio-stream/**
        - id: ml-service
          uri: ${ML_SERVICE_URI:http://localhost:8001}
          predicates:
            - Path=/api/ml/**
        - id: organisation-ws
          uri: ${ORGANISATION_SERVICE_URI:http://localhost:8190}
          predicates:
            - Path=/ws/**, /ws-org/**
        - id: rh-ws
          uri: ${RH_SERVICE_URI:http://localhost:8192}
          predicates:
            - Path=/ws-rh/**
        - id: presence-ws
          uri: ${PRESENCE_SERVICE_URI:http://localhost:8193}
          predicates:
            - Path=/ws-presence/**
        - id: communication-ws
          uri: ${COMMUNICATION_SERVICE_URI:http://localhost:8194}
          predicates:
            - Path=/ws-communication, /ws-communication/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: ${AUTH_SERVICE_DOCS_URL:http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8181}/v3/api-docs}
      - name: Organisation Service
        url: ${ORGANISATION_SERVICE_DOCS_URL:http://${ORGANISATION_SERVICE_HOST:localhost}:${ORGANISATION_SERVICE_PORT:8190}/v3/api-docs}
      - name: RH Service
        url: ${RH_SERVICE_DOCS_URL:http://${RH_SERVICE_HOST:localhost}:${RH_SERVICE_PORT:8192}/v3/api-docs}
      - name: Presence Service
        url: ${PRESENCE_SERVICE_DOCS_URL:http://${PRESENCE_SERVICE_HOST:localhost}:${PRESENCE_SERVICE_PORT:8193}/v3/api-docs}
      - name: Communication Service
        url: ${COMMUNICATION_SERVICE_DOCS_URL:http://${COMMUNICATION_SERVICE_HOST:localhost}:${COMMUNICATION_SERVICE_PORT:8194}/v3/api-docs}

logging:
  level:
    org.springframework.cloud.gateway: INFO

eureka:
  instance:
    prefer-ip-address: true
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8861}/eureka/}
