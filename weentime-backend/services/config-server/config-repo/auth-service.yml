server:

  port: ${SERVER_PORT:8081}

spring:
  main:
    lazy-initialization: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1027}

management:
  health:
    redis:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      organisationService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
  timelimiter:
    instances:
      organisationService:
        timeout-duration: 3s

logging:
  level:
    com.weentime.weentimeapp: INFO

integration:
  internal-api-key: ${INTERNAL_API_KEY:communication-service-local}
