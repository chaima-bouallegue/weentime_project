server:
  port: ${SERVER_PORT:8090}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${ORGANISATION_DB_NAME:${DB_NAME:organisation_db}}
    username: ${ORGANISATION_DB_USERNAME:${DB_USERNAME:weentime}}
    password: ${ORGANISATION_DB_PASSWORD:${DB_PASSWORD:170502}}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      initialization-fail-timeout: 0
      minimum-idle: 2
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    connect-retries: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

management:
  health:
    db:
      enabled: true

application:
  config:
    rh-service: ${RH_SERVICE_URL:http://${RH_SERVICE_HOST:localhost}:${RH_SERVICE_PORT:8092}/api/v1/rh}

resilience4j:
  circuitbreaker:
    instances:
      rhService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
  timelimiter:
    instances:
      rhService:
        timeout-duration: 3s

logging:
  level:
    com.weentime.weentimeproject: INFO
